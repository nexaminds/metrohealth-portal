global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: nexai-metrohealth-demo

scrape_configs:
  - job_name: patient-portal
    metrics_path: /metrics
    static_configs:
      - targets: ['portal-app:8080']
        labels:
          service: patient-portal
          env: prod
          client: metrohealth
          tier: tier_3_phi
